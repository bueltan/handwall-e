[platformio]
src_dir = .
default_envs = cyd

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv

lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    nitek/XPT2046_Bitbang_Slim

build_flags =
    -DUSER_SETUP_LOADED
    -DILI9341_2_DRIVER
    -DTFT_INVERSION_ON
    -DUSE_HSPI_PORT
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF

lib_extra_dirs = 
    ~/.platformio/packages/framework-arduinoespressif32/libraries